name: Validate Runtime Contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate inactive runner matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure obsolete runners stay inactive
        run: |
          test ! -d blender-runner
          test ! -d transcode-runner

      - name: Ensure docs mention current runtime ownership
        run: |
          grep -q "llama.cpp" README.md
          grep -q "no active container runners" CLAUDE.md
