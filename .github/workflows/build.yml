name: Validate Runtime Contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate inactive runner matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure obsolete runners stay inactive
        run: |
          test ! -d blender-runner
          test ! -d transcode-runner

      - name: Ensure docs mention current runtime ownership
        run: |
          grep -q "llama.cpp" README.md
          grep -q "market-sim-runner" CLAUDE.md

      - name: Test market replay runner
        run: python -m unittest market-sim-runner/runner_test.py

  publish-market-sim-runner:
    name: Build market-sim-runner image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/market-sim-runner" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -f market-sim-runner/Dockerfile -t market-sim-runner:ci market-sim-runner

      - name: Smoke test image
        run: |
          work="$(mktemp -d)"
          mkdir -p "$work/marketdata"
          cat > "$work/job.json" <<'JSON'
          {
            "version": "marketarena.run.v1",
            "task": "market_replay",
            "run_id": "ci_run",
            "agent_id": "ci_agent",
            "data_manifest_key": "marketdata/manifest.json",
            "universe": ["BTC-USD"],
            "initial_cash_cents": 10000000,
            "window": {
              "start": "2026-05-01T00:00:00Z",
              "end": "2026-05-01T03:00:00Z"
            }
          }
          JSON
          cat > "$work/marketdata/manifest.json" <<'JSON'
          {
            "events": [
              {"time":"2026-05-01T00:00:00Z","symbol":"BTC-USD","close_cents":10000},
              {"time":"2026-05-01T01:00:00Z","symbol":"BTC-USD","close_cents":11000},
              {"time":"2026-05-01T02:00:00Z","symbol":"BTC-USD","close_cents":12000},
              {"time":"2026-05-01T03:00:00Z","symbol":"BTC-USD","close_cents":9000}
            ],
            "news": [
              {"time":"2026-05-01T01:00:00Z","symbol":"BTC-USD","headline":"CI replay fixture"}
            ]
          }
          JSON
          docker run --rm --network=none -v "$work:/work" market-sim-runner:ci
          test -s "$work/receipt.json"
          test -s "$work/metrics.json"

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag market-sim-runner:ci "$IMAGE:latest"
          docker tag market-sim-runner:ci "$IMAGE:${GITHUB_SHA}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA}"
